<!DOCTYPE html>
<html lang="ru">
<head>
  <!--
    Здесь должен быть личный счётчик Яндекс.Метрики.
    Чужой счётчик удалён.
    После создания своего счётчика в Яндекс.Метрике нужно вставить сюда код,
    который выдаст сервис, и включить параметры webvisor и clickmap.
  -->

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Лабораторная работа №4 — Юзабилити-тестирование</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #5b7cfa 0%, #6f42c1 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #333;
    }

    .container {
      background: white;
      padding: 40px 30px;
      border-radius: 18px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
      width: 100%;
      max-width: 460px;
      text-align: center;
    }

    .lab-label {
      display: inline-block;
      margin-bottom: 12px;
      padding: 6px 12px;
      border-radius: 999px;
      background: #eef2ff;
      color: #5a67d8;
      font-size: 13px;
      font-weight: 700;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 28px;
      color: #3f3f46;
    }

    .subtitle {
      margin-bottom: 30px;
      color: #71717a;
      font-size: 15px;
    }

    .form-group {
      margin-bottom: 24px;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #52525b;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d4d4d8;
      border-radius: 10px;
      font-size: 16px;
      transition: all 0.25s ease;
    }

    input:focus {
      outline: none;
      border-color: #5b7cfa;
      box-shadow: 0 0 0 4px rgba(91, 124, 250, 0.15);
    }

    input.error-field {
      border-color: #e53e3e;
      box-shadow: 0 0 0 3px rgba(229, 62, 62, 0.15);
    }

    .password-wrapper {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 20px;
      color: #888;
      user-select: none;
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: #5b7cfa;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    button[type="submit"]:hover {
      background: #4c6ef5;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(91, 124, 250, 0.35);
    }

    .extra-links {
      margin-top: 25px;
      font-size: 14px;
    }

    .extra-links a {
      color: #5b7cfa;
      text-decoration: none;
      font-weight: 500;
    }

    .extra-links a:hover {
      text-decoration: underline;
    }

    .error-message {
      display: none;
      margin-top: 18px;
      padding: 14px 16px;
      background: #fff5f5;
      color: #c53030;
      border: 1px solid #feb2b2;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      text-align: left;
    }

    .error-message.visible {
      display: block;
    }

    .success-message {
      display: none;
      margin-top: 25px;
      padding: 15px;
      background: #e8f5e9;
      color: #2e7d32;
      border-radius: 10px;
      font-weight: 500;
    }

    .success-message.visible {
      display: block;
    }

    .field-error {
      display: block;
      margin-top: 6px;
      font-size: 12px;
      color: #c53030;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="lab-label">Юзабилити-тестирование</span>
    <h1>Вход в учебный сервис</h1>
    <p class="subtitle">Тестовая форма для анализа удобства интерфейса</p>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="username">Логин или email</label>
        <input type="text" id="username" placeholder="testuser или ivan@example.com" autocomplete="username">
        <span class="field-error" id="usernameError"></span>
      </div>

      <div class="form-group">
        <label for="password">Пароль</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Введите пароль" autocomplete="current-password">
          <span class="toggle-password" id="togglePassword" role="button" aria-label="Показать или скрыть пароль">👁</span>
        </div>
        <span class="field-error" id="passwordError"></span>
      </div>

      <button type="submit" id="loginBtn">Войти</button>
    </form>

    <div class="error-message" id="errorMsg"></div>

    <div class="extra-links">
      <a href="#">Забыли пароль?</a> • <a href="#">Создать аккаунт</a>
    </div>

    <div class="success-message" id="successMsg">
      Успешный вход! Добро пожаловать, <span id="userName"></span> 🎉
    </div>
  </div>

  <script>
    const USERS = {
      'testuser': 'password123',
      'admin': 'admin123',
      'ivan@example.com': 'password123'
    };

    const form = document.getElementById('loginForm');
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const usernameInput = document.getElementById('username');
    const successMsg = document.getElementById('successMsg');
    const errorMsg = document.getElementById('errorMsg');
    const userNameSpan = document.getElementById('userName');
    const usernameError = document.getElementById('usernameError');
    const passwordError = document.getElementById('passwordError');

    togglePassword.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      togglePassword.textContent = isPassword ? '🙈' : '👁';
    });

    usernameInput.addEventListener('input', clearErrors);
    passwordInput.addEventListener('input', clearErrors);

    function clearErrors() {
      usernameInput.classList.remove('error-field');
      passwordInput.classList.remove('error-field');
      usernameError.textContent = '';
      passwordError.textContent = '';
      errorMsg.classList.remove('visible');
      errorMsg.textContent = '';
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();

      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      let valid = true;

      if (!username) {
        usernameInput.classList.add('error-field');
        usernameError.textContent = 'Поле «Логин или email» обязательно для заполнения.';
        valid = false;
      }

      if (!password) {
        passwordInput.classList.add('error-field');
        passwordError.textContent = 'Поле «Пароль» обязательно для заполнения.';
        valid = false;
      }

      if (!valid) {
        return;
      }

      const expectedPassword = USERS[username];

      if (!expectedPassword) {
        errorMsg.textContent = 'Пользователь с таким логином не найден.';
        errorMsg.classList.add('visible');
        usernameInput.classList.add('error-field');
        return;
      }

      if (expectedPassword !== password) {
        errorMsg.textContent = 'Неверный пароль. Пожалуйста, проверьте введённые данные.';
        errorMsg.classList.add('visible');
        passwordInput.classList.add('error-field');
        return;
      }

      form.style.display = 'none';
      errorMsg.classList.remove('visible');
      successMsg.classList.add('visible');
      userNameSpan.textContent = username;
    });
  </script>
</body>
</html>
